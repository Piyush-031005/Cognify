version: '3.8'

services:
  api:
    build: .
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - COGNIFY_SECRET_KEY=production_env_secret_key_change_me_987654321
      - COGNIFY_BYPASS_AUTH=false
      - DATABASE_URL=/app/data/cognify.db
    volumes:
      - cognify_data:/app/data
    restart: always

volumes:
  cognify_data:
